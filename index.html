<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Real-Time Chat Room</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f14;
            --panel-bg: rgba(22, 28, 41, 0.45);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --text-color: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0, transparent 50%);
        }

        /* Glassmorphic Container */
        .chat-container {
            width: 90%;
            max-width: 850px;
            height: 80vh;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }

        /* Header Layout */
        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(13, 15, 20, 0.6);
        }

        .chat-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(to right, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.04);
            padding: 6px 14px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--danger);
            box-shadow: 0 0 10px var(--danger);
            transition: all 0.3s ease;
        }

        .status-dot.online {
            background-color: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        /* Screen States */
        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow: hidden;
        }

        .hidden {
            display: none !important;
        }

        /* Login Box style */
        .login-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 20px;
        }

        .login-screen p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 450px;
            margin-bottom: 10px;
        }

        .input-group {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.25);
            background: rgba(255, 255, 255, 0.08);
        }

        button {
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
            background: linear-gradient(135deg, var(--primary-hover), #1e40af);
        }

        button:active {
            transform: translateY(0);
        }

        /* Message Board style */
        .message-board {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        /* Customize Scrollbar */
        .message-board::-webkit-scrollbar {
            width: 6px;
        }
        .message-board::-webkit-scrollbar-track {
            background: transparent;
        }
        .message-board::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .message-board::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Chat bubbles */
        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: slideUp 0.3s ease forwards;
            position: relative;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.received {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-top-left-radius: 4px;
        }

        .message.sent {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.9), rgba(29, 78, 216, 0.9));
            align-self: flex-end;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }

        .message.system {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.08);
            max-width: 100%;
            align-self: center;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border-radius: 12px;
            padding: 10px 20px;
        }

        .sender {
            font-size: 0.8rem;
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 2px;
        }

        .message.sent .sender {
            color: #93c5fd;
        }

        .message-text {
            font-size: 0.95rem;
            word-break: break-word;
        }

        .timestamp {
            font-size: 0.7rem;
            color: var(--text-secondary);
            align-self: flex-end;
        }

        .message.sent .timestamp {
            color: rgba(255, 255, 255, 0.6);
        }

        /* Message input footer styling */
        .chat-input-area {
            display: flex;
            gap: 12px;
        }

        .chat-input-area input {
            flex: 1;
        }

        .chat-input-area button {
            padding: 16px 30px;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <h1><span>⚡</span> WebSocket Chat</h1>
            <div class="status-container">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Disconnected</span>
            </div>
        </div>

        <!-- Login Screen -->
        <div class="screen login-screen" id="loginScreen">
            <h2>Enter Username</h2>
            <p>Connect to the local WebSocket server to experience low-latency bidirectional messaging in real-time.</p>
            <div class="input-group">
                <input type="text" id="usernameInput" placeholder="Type a cool alias..." maxlength="20" autofocus>
                <button id="loginBtn">Connect to Chat</button>
            </div>
        </div>

        <!-- Chat Screen -->
        <div class="screen hidden" id="chatScreen">
            <div class="message-board" id="messageBoard">
                <!-- Messages append here -->
            </div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Type a message..." maxlength="200">
                <button id="sendBtn">Send Message</button>
            </div>
        </div>
    </div>

    <script>
        const loginScreen = document.getElementById('loginScreen');
        const chatScreen = document.getElementById('chatScreen');
        const usernameInput = document.getElementById('usernameInput');
        const loginBtn = document.getElementById('loginBtn');
        const messageBoard = document.getElementById('messageBoard');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let socket = null;
        let myUsername = '';

        // 1. Establish the stateful WebSocket connection
        function connectWebSocket() {
            // Initiate the HTTP Upgrade handshake to the local WebSocket server on port 8080
            socket = new WebSocket('ws://localhost:8080');

            // Socket State Transitions
            socket.onopen = () => {
                console.log('[WebSocket] Connection open. Handshake switching protocols complete.');
                statusDot.classList.add('online');
                statusText.innerText = 'Connected';
                
                // Switch screen view
                loginScreen.classList.add('hidden');
                chatScreen.classList.remove('hidden');
                messageInput.focus();
            };

            // Listen for incoming frames from the WebSocket server
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                appendMessage(data.sender, data.message, data.timestamp, false);
            };

            socket.onclose = () => {
                console.warn('[WebSocket] Connection closed.');
                statusDot.classList.remove('online');
                statusText.innerText = 'Disconnected';
                
                // Fallback to login screen
                chatScreen.classList.add('hidden');
                loginScreen.classList.remove('hidden');
            };

            socket.onerror = (error) => {
                console.error('[WebSocket] Error occurred:', error);
            };
        }

        // 2. Dispatch a text payload message frame over the socket
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || socket.readyState !== WebSocket.OPEN) return;

            const payload = JSON.stringify({
                username: myUsername,
                message: text
            });

            // Sends the packet over the persistent TCP stream in a frame
            socket.send(payload);

            // Display in own chat bubble immediately (local render)
            appendMessage(myUsername, text, new Date().toLocaleTimeString(), true);
            messageInput.value = '';
            messageInput.focus();
        }

        // Helper to construct bubbles
        function appendMessage(sender, text, timestamp, isOwn = false) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');
            
            if (sender === 'System') {
                messageElement.classList.add('system');
                messageElement.innerHTML = `<span class="message-text">${text}</span>`;
            } else {
                messageElement.classList.add(isOwn ? 'sent' : 'received');
                messageElement.innerHTML = `
                    <span class="sender">${sender}</span>
                    <span class="message-text">${text}</span>
                    <span class="timestamp">${timestamp}</span>
                `;
            }

            messageBoard.appendChild(messageElement);
            // Autoscroll chat page to the bottom
            messageBoard.scrollTop = messageBoard.scrollHeight;
        }

        // Event Listeners
        loginBtn.addEventListener('click', () => {
            const user = usernameInput.value.trim();
            if (user) {
                myUsername = user;
                connectWebSocket();
            }
        });

        usernameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
